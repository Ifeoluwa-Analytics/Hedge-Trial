<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedge Guardian View</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-900 text-white font-sans antialiased transition-colors duration-500" id="body-bg">

    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-6">

        <header class="text-center py-4">
            <h1 class="text-2xl font-black tracking-wider text-emerald-400">HEDGE</h1>
            <p class="text-gray-400 text-xs">Micro-Location Proximity Tracker</p>
        </header>

        <main class="flex-1 flex flex-col justify-center items-center my-6">
            <div id="status-card"
                 class="w-full bg-gray-800 rounded-3xl p-8 text-center shadow-xl border border-gray-700 transition-all duration-500">

                <div class="flex justify-center mb-6">
                    <div id="status-pulse"
                         class="w-24 h-24 rounded-full bg-emerald-500/20 flex items-center justify-center animate-pulse">
                        <div id="status-dot"
                             class="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-2xl">
                            📡
                        </div>
                    </div>
                </div>

                <h2 id="child-name"  class="text-xl font-bold mb-1">Waiting for Beacon...</h2>
                <h3 id="child-id"    class="text-sm text-gray-500 mb-1">CH_--</h3>
                <p  id="system-message" class="text-gray-400 text-sm mb-6">
                    Start your scanner loop to transmit signal details.
                </p>

                <hr class="border-gray-700 my-4">

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-900 p-3 rounded-xl border border-gray-700/50">
                        <p class="text-xs text-gray-400 uppercase tracking-wider">Signal (RSSI)</p>
                        <p id="rssi-val" class="text-lg font-bold text-gray-200">-- dBm</p>
                    </div>
                    <div class="bg-gray-900 p-3 rounded-xl border border-gray-700/50">
                        <p class="text-xs text-gray-400 uppercase tracking-wider">Status</p>
                        <p id="status-val" class="text-lg font-bold text-emerald-400">STANDBY</p>
                    </div>
                </div>

                <!-- ── Estimated distance pill ──────────────────────────────────────
                     Mirrors the mobile mockup's "4.2m from parent · Within safe zone"
                     chip. Hidden until the first real reading arrives. -->
                <div id="distance-pill"
                     class="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full
                            bg-emerald-500/10 border border-emerald-500/30 hidden">
                    <span id="distance-dot" class="w-2 h-2 rounded-full bg-emerald-400"></span>
                    <span id="distance-text" class="text-sm font-medium text-emerald-300">
                        -- m from parent · Within safe zone
                    </span>
                </div>
            </div>
        </main>

        <footer id="emergency-action" class="w-full hidden pb-4">
            <button
                onclick="escalate()"
                class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold
                       py-4 px-6 rounded-2xl shadow-lg uppercase tracking-wide text-sm
                       transition-all animate-bounce">
                Escalate to Venue Security
            </button>
        </footer>

    </div><!-- /max-w -->

    <audio id="alarm-sound"
           src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"
           preload="auto"
           loop></audio>

    <script>
    // ─── DOM REFS ─────────────────────────────────────────────────────────────
    const bodyBg          = document.getElementById('body-bg');
    const statusCard      = document.getElementById('status-card');
    const statusDot       = document.getElementById('status-dot');
    const statusPulse     = document.getElementById('status-pulse');
    const childName       = document.getElementById('child-name');
    const childId         = document.getElementById('child-id');
    const systemMessage   = document.getElementById('system-message');
    const rssiVal         = document.getElementById('rssi-val');
    const statusVal       = document.getElementById('status-val');
    const emergencyAction = document.getElementById('emergency-action');
    const alarmSound      = document.getElementById('alarm-sound');
    const distancePill    = document.getElementById('distance-pill');
    const distanceDot     = document.getElementById('distance-dot');
    const distanceText    = document.getElementById('distance-text');

    // ─── AUDIO UNLOCK ────────────────────────────────────────────────────────
    // Mobile browsers (Safari, Chrome-Android) require a user gesture before
    // audio can play. We silently attempt to play/pause on the first tap
    // anywhere on the page to pre-unlock the audio context.
    let audioUnlocked = false;

    function tryUnlockAudio() {
        if (audioUnlocked) return;
        alarmSound.play()
            .then(() => { alarmSound.pause(); alarmSound.currentTime = 0; audioUnlocked = true; })
            .catch(() => { /* silent — browser blocked; will retry on next gesture */ });
    }
    document.addEventListener('click',      tryUnlockAudio, { passive: true });
    document.addEventListener('touchstart', tryUnlockAudio, { passive: true });

    // ─── ESCALATION HANDLER ──────────────────────────────────────────────────
    function escalate() {
        alert('🚨 Venue Security has been notified. Help is on the way.');
        // In production: POST to /api/escalate or send SMS via backend.
    }

    // ─── RSSI → DISTANCE ESTIMATION ──────────────────────────────────────────
    // Standard log-distance path-loss model:
    //   distance = 10 ^ ((measuredPower - rssi) / (10 * N))
    // measuredPower = calibrated RSSI at 1 metre for this beacon type.
    // N             = environmental path-loss exponent (2 = free space,
    //                 2.7-4 = indoors with walls/bodies/interference).
    // These are estimates, not precise measurements — BLE RSSI is inherently
    // noisy, so treat the output as "roughly how far", not a ruler reading.
    const MEASURED_POWER_AT_1M = -52;
    const PATH_LOSS_EXPONENT   = 2.5;

    function rssiToDistance(rssi) {
        if (rssi === undefined || rssi === null) return null;
        const distance = Math.pow(10, (MEASURED_POWER_AT_1M - rssi) / (10 * PATH_LOSS_EXPONENT));
        return Math.round(distance * 10) / 10;   // one decimal place
    }

    function formatDistance(metres) {
        if (metres === null) return '-- m';
        // Past ~100m the model is just noise dressed up as precision —
        // round to whole metres so it doesn't read as falsely exact.
        return metres < 100 ? `${metres.toFixed(1)}m` : `${Math.round(metres)}m`;
    }

    // Tracks the last distance we actually trusted (i.e. computed while the
    // beacon was live), so LOST/BREACH can keep showing "last seen" instead
    // of collapsing to "--".
    let lastKnownDistance = null;
    let lastKnownTime     = null;

    // ─── VISUAL STATE MACHINE ────────────────────────────────────────────────
    // Maps every status the server can send to a visual theme AND to the
    // distance-pill's copy/color, kept in lock-step so they always agree.

    function applyTheme(status, rssi) {
        // Reset shared elements first
        emergencyAction.classList.add('hidden');
        alarmSound.pause();

        switch (status) {

            case 'SECURE': {
                bodyBg.className      = 'bg-gray-900 text-white font-sans antialiased transition-colors duration-500';
                statusCard.className  = 'w-full bg-gray-800 rounded-3xl p-8 text-center shadow-xl border border-gray-700 transition-all duration-500';
                statusDot.className   = 'w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-2xl';
                statusPulse.className = 'w-24 h-24 rounded-full bg-emerald-500/20 flex items-center justify-center animate-pulse';
                statusVal.className   = 'text-lg font-bold text-emerald-400';
                statusDot.textContent = '📡';

                const d = rssiToDistance(rssi);
                lastKnownDistance = d;
                lastKnownTime     = new Date();
                showDistancePill(
                    'emerald',
                    `${formatDistance(d)} from parent · Within safe zone`
                );
                break;
            }

            // ── backend sends "NOT_FOUND" for the brief searching window
            //    before MIN_CONSECUTIVE_FOR_BREACH is reached, and "WEAK"
            //    for a live-but-fading signal — both render the same way ──
            case 'NOT_FOUND':
            case 'WEAK': {
                bodyBg.className      = 'bg-yellow-950 text-white font-sans antialiased transition-colors duration-500';
                statusCard.className  = 'w-full bg-yellow-900/80 rounded-3xl p-8 text-center shadow-2xl border border-yellow-500 transition-all duration-500';
                statusDot.className   = 'w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center text-2xl animate-bounce';
                statusPulse.className = 'w-24 h-24 rounded-full bg-yellow-600/40 flex items-center justify-center';
                statusVal.className   = 'text-lg font-bold text-yellow-200';
                statusDot.textContent = '⚠️';
                emergencyAction.classList.remove('hidden');

                if (status === 'WEAK') {
                    // Beacon is still live, just fading — distance is current.
                    const d = rssiToDistance(rssi);
                    lastKnownDistance = d;
                    lastKnownTime     = new Date();
                    showDistancePill(
                        'yellow',
                        `${formatDistance(d)} from parent · Departing safe zone`
                    );
                } else {
                    // NOT_FOUND: beacon has dropped out very recently and we
                    // don't have a fresh RSSI yet — hold the last trusted
                    // reading rather than guessing from a stale buffer.
                    showDistancePill(
                        'yellow',
                        lastKnownDistance !== null
                            ? `Last seen ${formatDistance(lastKnownDistance)} · Departing safe zone`
                            : 'Searching for beacon…'
                    );
                }
                break;
            }

            case 'BREACH':
            case 'LOST': {
                bodyBg.className      = 'bg-red-950 text-white font-sans antialiased transition-colors duration-500';
                statusCard.className  = 'w-full bg-red-900 rounded-3xl p-8 text-center shadow-2xl border border-red-500 transition-all duration-500';
                statusDot.className   = 'w-12 h-12 rounded-full bg-red-500 flex items-center justify-center text-2xl';
                statusPulse.className = 'w-24 h-24 rounded-full bg-red-600/40 flex items-center justify-center animate-ping';
                statusVal.className   = 'text-lg font-bold text-red-200';
                statusDot.textContent = '🚨';
                emergencyAction.classList.remove('hidden');
                if (audioUnlocked) alarmSound.play().catch(() => {});

                // Freeze on the last trusted distance/time — never recompute
                // from the placeholder -120 dBm the backend sends for BREACH.
                const timeLabel = lastKnownTime
                    ? lastKnownTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : null;
                showDistancePill(
                    'red',
                    lastKnownDistance !== null
                        ? `Last seen ${formatDistance(lastKnownDistance)}${timeLabel ? ` · ${timeLabel}` : ''}`
                        : 'Beacon not detected'
                );
                break;
            }

            case 'INIT':
            default: {
                bodyBg.className      = 'bg-gray-900 text-white font-sans antialiased transition-colors duration-500';
                statusCard.className  = 'w-full bg-gray-800 rounded-3xl p-8 text-center shadow-xl border border-gray-700 transition-all duration-500';
                statusDot.className   = 'w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center text-2xl animate-pulse';
                statusPulse.className = 'w-24 h-24 rounded-full bg-blue-500/20 flex items-center justify-center';
                statusVal.className   = 'text-lg font-bold text-blue-400';
                statusDot.textContent = '🔍';
                hideDistancePill();
                break;
            }
        }
    }

    // ── Distance pill helpers ─────────────────────────────────────────────────
    const PILL_THEMES = {
        emerald: {
            wrap: 'mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 border border-emerald-500/30',
            dot:  'w-2 h-2 rounded-full bg-emerald-400',
            text: 'text-sm font-medium text-emerald-300',
        },
        yellow: {
            wrap: 'mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-yellow-500/10 border border-yellow-500/40',
            dot:  'w-2 h-2 rounded-full bg-yellow-400',
            text: 'text-sm font-medium text-yellow-200',
        },
        red: {
            wrap: 'mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-red-500/10 border border-red-500/40',
            dot:  'w-2 h-2 rounded-full bg-red-400',
            text: 'text-sm font-medium text-red-200',
        },
    };

    function showDistancePill(theme, text) {
        const t = PILL_THEMES[theme] || PILL_THEMES.emerald;
        distancePill.className = t.wrap;
        distanceDot.className  = t.dot;
        distanceText.className = t.text;
        distanceText.textContent = text;
        distancePill.classList.remove('hidden');
    }

    function hideDistancePill() {
        distancePill.classList.add('hidden');
    }

    // ─── WEBSOCKET ────────────────────────────────────────────────────────────
    let socket;
    let reconnectDelay = 4000;   // ms — slightly longer than original to reduce spam
    let reconnectTimer = null;

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl    = `${protocol}//${window.location.host}/ws/monitor`;
        console.log(`🔌 [HEDGE] Connecting → ${wsUrl}`);

        systemMessage.textContent = 'Connecting to cloud engine…';

        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            console.log('✅ [HEDGE] WebSocket open');
            reconnectDelay = 4000;           // reset back-off on successful connect
            systemMessage.textContent = 'Scanning for beacon signals…';
        };

        socket.onmessage = (event) => {
            let data;
            try { data = JSON.parse(event.data); }
            catch { return; }

            console.log('📥 [HEDGE] Packet:', data);

            // ── guard HEARTBEAT BEFORE touching DOM ───────────────────────
            if (data.status === 'HEARTBEAT') return;

            // Update text content
            childName.textContent     = data.child_name || 'Unknown';
            childId.textContent       = data.child_id   || 'CH_--';
            rssiVal.textContent       = (data.rssi !== undefined ? data.rssi : '--') + ' dBm';
            systemMessage.textContent = data.message    || '';
            statusVal.textContent     = data.status     || 'UNKNOWN';

            // Apply matching visual theme + distance pill
            applyTheme(data.status, data.rssi);
        };

        socket.onclose = (e) => {
            console.warn(`❌ [HEDGE] Connection closed (code ${e.code}) — retrying in ${reconnectDelay / 1000}s`);
            systemMessage.textContent = `Reconnecting… (${reconnectDelay / 1000}s)`;
            // Exponential back-off, capped at 30 s
            reconnectTimer = setTimeout(() => {
                reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
                connect();
            }, reconnectDelay);
        };

        socket.onerror = (e) => {
            console.error('⚠️  [HEDGE] WebSocket error', e);
            // onclose fires after onerror — reconnect logic lives there
        };
    }

    connect();
    </script>
</body>
</html>
